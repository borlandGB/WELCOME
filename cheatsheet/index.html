<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nick · Cheatsheet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d5 100%);
            color: #2c2c2c;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #8b5e3c, #c4a47a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .home-link {
            color: #8b5e3c;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tab-btn {
            background: white;
            border: 1px solid rgba(139,94,60,0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4a4438;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: rgba(139,94,60,0.1);
            border-color: #8b5e3c;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #8b5e3c, #a87b53);
            border-color: transparent;
            color: white;
        }

        .content-area {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .topic-content {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topic-content h2 {
            color: #8b5e3c;
            margin-bottom: 1.2rem;
            font-size: 1.5rem;
            border-bottom: 2px solid #f0e8dc;
            padding-bottom: 0.5rem;
        }

        .command-block {
            background: #2c2c2c;
            color: #e8e0d5;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0 0.5rem 0;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
        }

        .desc {
            color: #6b6255;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            padding-left: 0.8rem;
            border-left: 3px solid #c4a47a;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #8a7f6e;
        }

        .error {
            text-align: center;
            padding: 2rem;
            color: #c44a3c;
        }

        @media (max-width: 768px) {
            .header { padding: 0.8rem 1rem; }
            .header h1 { font-size: 1.2rem; }
            .tabs { padding: 0.8rem 1rem; }
            .tab-btn { padding: 0.4rem 0.9rem; font-size: 0.75rem; }
            .content-area { padding: 1rem; }
            .topic-content { padding: 1rem; }
            .topic-content h2 { font-size: 1.2rem; }
            .command-block { font-size: 0.7rem; }
            .desc { font-size: 0.75rem; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #ede6db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c4a47a; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 Cheatsheet</h1>
        <!-- FIX: target="_top" breaks out of any iframe and loads in full window -->
        <a href="/" class="home-link" target="_top">← Home</a>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="content-area" id="content-area">
        <div class="loading">Loading...</div>
    </div>

    <script>
        // List of topics and their corresponding HTML files
        const topics = {
            github: { name: "GitHub", file: "github.html" },
            jetson: { name: "Jetson Orin", file: "jetson.html" },
            linux: { name: "Linux", file: "linux.html" },
            python: { name: "Python", file: "python.html" },
            flask: { name: "Flask", file: "flask.html" },
            nginx: { name: "Nginx", file: "nginx.html" },
            html: { name: "HTML/CSS", file: "html.html" },
            webserver: { name: "Web Server", file: "webserver.html" },
            firewall: { name: "Firewall", file: "firewall.html" },
            backend: { name: "Backend", file: "backend.html" },
            frontend: { name: "Frontend", file: "frontend.html" },
            esp32: { name: "ESP32", file: "esp32.html" }
        };

        const tabsContainer = document.getElementById('tabs');
        const contentArea = document.getElementById('content-area');
        let activeTopic = 'github';

        // Function to load content from external HTML file
        async function loadContent(topicId) {
            const topic = topics[topicId];
            if (!topic) return;

            // Show loading indicator
            contentArea.innerHTML = '<div class="loading">Loading content...</div>';

            try {
                const response = await fetch(`/cheatsheet/${topic.file}`, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });

                if (response.ok) {
                    const html = await response.text();
                    contentArea.innerHTML = `<div class="topic-content">${html}</div>`;
                } else {
                    contentArea.innerHTML = `<div class="error">Error: Could not load ${topic.name}. File not found.</div>`;
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="error">Error: Failed to load content for ${topic.name}.</div>`;
            }
        }

        // Create tab buttons
        Object.keys(topics).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            if (key === activeTopic) btn.classList.add('active');
            btn.textContent = topics[key].name;

            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeTopic = key;
                loadContent(key);
            };

            tabsContainer.appendChild(btn);
        });

        // Load initial content
        loadContent('github');
    </script>
</body>
</html>
