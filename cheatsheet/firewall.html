<div class="topic-view"><div class="topic-content"><h2>🛡️ Firewall (UFW) Commands</h2>
<div class="command-block">sudo ufw status</div><div class="desc">Check firewall status</div>
<div class="command-block">sudo ufw allow 80/tcp</div><div class="desc">Allow HTTP traffic</div>
<div class="command-block">sudo ufw allow 443/tcp</div><div class="desc">Allow HTTPS traffic</div>
<div class="command-block">sudo ufw allow 22/tcp</div><div class="desc">Allow SSH</div>
<div class="command-block">sudo ufw enable</div><div class="desc">Enable firewall</div>
<div class="command-block">sudo ufw disable</div><div class="desc">Disable firewall</div>
</div></div>
